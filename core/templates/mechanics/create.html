{% extends "base.html" %}

{% block title %}Novo Funcionário{% endblock %}

{% block content %}
<div class="flex justify-between items-center mb-6">
    <div>
        <h1 class="text-2xl font-bold text-white">Novo Funcionário</h1>
        <p class="text-gray-400">Cadastre um novo profissional para a oficina ou para o atendimento.</p>
    </div>
    <a href="{{ url_for('mechanics.list_mechanics') }}" class="text-gray-400 hover:text-white transition">
        <i class="fas fa-arrow-left"></i> Voltar
    </a>
</div>

<div class="bg-gray-800 rounded-lg shadow-xl max-w-4xl mx-auto overflow-hidden">
    <div class="flex border-b border-gray-700">
        <button onclick="switchTab('tab-main')" id="btn-tab-main"
            class="flex-1 py-4 px-6 text-sm font-medium text-blue-500 border-b-2 border-blue-500 focus:outline-none transition">
            <i class="fas fa-user-circle mr-2"></i> Principal
        </button>
        <button onclick="switchTab('tab-address')" id="btn-tab-address"
            class="flex-1 py-4 px-6 text-sm font-medium text-gray-400 border-b-2 border-transparent hover:text-gray-200 focus:outline-none transition">
            <i class="fas fa-map-marker-alt mr-2"></i> Endereço e Contato
        </button>
    </div>

    <form action="{{ url_for('mechanics.create') }}" method="POST" enctype="multipart/form-data" class="p-6">
        <div id="tab-main" class="tab-content space-y-6">
            <div class="flex justify-center mb-6">
                <div class="relative group cursor-pointer">
                    <div class="w-32 h-32 rounded-full bg-gray-700 overflow-hidden border-4 border-gray-600">
                        <img id="photoPreview" class="w-full h-full object-cover hidden">
                        <div id="photoPlaceholder" class="w-full h-full flex flex-col items-center justify-center text-gray-400">
                            <i class="fas fa-user text-3xl mb-1"></i>
                            <span class="text-xs">Foto</span>
                        </div>
                    </div>
                    <label for="photoUpload" class="absolute inset-0 flex items-center justify-center bg-black/50 rounded-full opacity-0 group-hover:opacity-100 transition cursor-pointer">
                        <i class="fas fa-camera text-white"></i>
                    </label>
                    <input type="file" name="photo" id="photoUpload" accept="image/*" class="hidden" onchange="previewPhoto(this)">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="col-span-2">
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Nome Completo *</label>
                    <input type="text" name="name" required class="w-full bg-[#11161a] border border-gray-700 rounded-lg py-3 px-4 text-white focus:outline-none focus:border-blue-500 transition">
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Telefone / Celular</label>
                    <input type="text" name="phone" placeholder="(00) 00000-0000" class="w-full bg-[#11161a] border border-gray-700 rounded-lg py-3 px-4 text-white focus:outline-none focus:border-blue-500 transition phone-mask">
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Data de Nascimento</label>
                    <input type="date" name="birth_date" class="w-full bg-[#11161a] border border-gray-700 rounded-lg py-3 px-4 text-white focus:outline-none focus:border-blue-500 transition">
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Data de Contratação</label>
                    <input type="date" name="hiring_date" class="w-full bg-[#11161a] border border-gray-700 rounded-lg py-3 px-4 text-white focus:outline-none focus:border-blue-500 transition">
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Experiência (Anos)</label>
                    <input type="number" name="experience_years" min="0" value="0" class="w-full bg-[#11161a] border border-gray-700 rounded-lg py-3 px-4 text-white focus:outline-none focus:border-blue-500 transition">
                </div>
            </div>

            <div class="flex justify-end pt-4">
                <button type="button" onclick="switchTab('tab-address')" class="bg-gray-700 hover:bg-gray-600 text-white px-6 py-2 rounded-lg transition">
                    Próximo <i class="fas fa-arrow-right ml-2"></i>
                </button>
            </div>
        </div>

        <div id="tab-address" class="tab-content hidden space-y-6">
            <h3 class="text-lg font-bold text-white border-b border-gray-700 pb-2">Endereço</h3>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="col-span-1">
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">CEP</label>
                    <div class="relative">
                        <input type="text" name="addr_cep" id="addr_cep" placeholder="00000-000" maxlength="9" onblur="fetchAddress(this.value)"
                            class="w-full bg-[#11161a] border border-gray-700 rounded-lg py-3 px-4 text-white focus:outline-none focus:border-blue-500 transition">
                        <div id="cep_loading" class="hidden absolute right-3 top-3.5">
                            <i class="fas fa-spinner fa-spin text-blue-500"></i>
                        </div>
                    </div>
                </div>
                <div class="col-span-2">
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Rua / Logradouro</label>
                    <input type="text" name="addr_street" id="addr_street" class="w-full bg-[#11161a] border border-gray-700 rounded-lg py-3 px-4 text-white focus:outline-none focus:border-blue-500 transition">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Número</label>
                    <input type="text" name="addr_number" id="addr_number" class="w-full bg-[#11161a] border border-gray-700 rounded-lg py-3 px-4 text-white focus:outline-none focus:border-blue-500 transition">
                </div>
                <div class="col-span-2">
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Bairro</label>
                    <input type="text" name="addr_district" id="addr_district" class="w-full bg-[#11161a] border border-gray-700 rounded-lg py-3 px-4 text-white focus:outline-none focus:border-blue-500 transition">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="col-span-2">
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Cidade</label>
                    <input type="text" name="addr_city" id="addr_city" class="w-full bg-[#11161a] border border-gray-700 rounded-lg py-3 px-4 text-white focus:outline-none focus:border-blue-500 transition">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">UF</label>
                    <input type="text" name="addr_state" id="addr_state" maxlength="2" class="w-full bg-[#11161a] border border-gray-700 rounded-lg py-3 px-4 text-white focus:outline-none focus:border-blue-500 transition uppercase">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Ponto de Referência</label>
                    <input type="text" name="address_reference" placeholder="Ex: Próximo ao mercado..." class="w-full bg-[#11161a] border border-gray-700 rounded-lg py-3 px-4 text-white focus:outline-none focus:border-blue-500 transition">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Contato de Emergência</label>
                    <input type="text" name="emergency_contact" placeholder="(00) 00000-0000" class="w-full bg-[#11161a] border border-gray-700 rounded-lg py-3 px-4 text-white focus:outline-none focus:border-blue-500 transition phone-mask">
                </div>
            </div>

            <div class="flex justify-between pt-6 mt-6 border-t border-gray-700">
                <button type="button" onclick="switchTab('tab-main')" class="text-gray-400 hover:text-white px-4 py-2 transition">
                    <i class="fas fa-arrow-left mr-2"></i> Voltar
                </button>
                <button type="submit" class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-3 rounded-lg font-bold shadow-lg shadow-blue-500/20 transition transform hover:-translate-y-1">
                    Salvar Funcionário
                </button>
            </div>
        </div>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
    function previewPhoto(input) {
        if (input.files && input.files[0]) {
            var reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('photoPreview').src = e.target.result;
                document.getElementById('photoPreview').classList.remove('hidden');
                document.getElementById('photoPlaceholder').classList.add('hidden');
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));

        const btnMain = document.getElementById('btn-tab-main');
        const btnAddr = document.getElementById('btn-tab-address');

        if (btnMain) {
            btnMain.className = "flex-1 py-4 px-6 text-sm font-medium border-b-2 focus:outline-none transition " +
                (tabId === 'tab-main' ? "text-blue-500 border-blue-500" : "text-gray-400 border-transparent hover:text-gray-200");
        }

        if (btnAddr) {
            btnAddr.className = "flex-1 py-4 px-6 text-sm font-medium border-b-2 focus:outline-none transition " +
                (tabId === 'tab-address' ? "text-blue-500 border-blue-500" : "text-gray-400 border-transparent hover:text-gray-200");
        }

        const tab = document.getElementById(tabId);
        if (tab) {
            tab.classList.remove('hidden');
        }
    }

    async function fetchAddress(cepRaw) {
        const cep = cepRaw.replace(/\D/g, '');
        if (cep.length !== 8) return;

        document.getElementById('cep_loading').classList.remove('hidden');

        try {
            const response = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
            const data = await response.json();

            document.getElementById('cep_loading').classList.add('hidden');

            if (data.erro) {
                Toastify({ text: "CEP não encontrado.", backgroundColor: "#ef4444" }).showToast();
                return;
            }

            document.getElementById('addr_street').value = data.logradouro;
            document.getElementById('addr_district').value = data.bairro;
            document.getElementById('addr_city').value = data.localidade;
            document.getElementById('addr_state').value = data.uf;
            document.getElementById('addr_number').focus();

        } catch(e) {
            document.getElementById('cep_loading').classList.add('hidden');
            Toastify({ text: "Erro ao buscar CEP.", backgroundColor: "#ef4444" }).showToast();
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        const phoneInputs = document.querySelectorAll('.phone-mask, input[name="phone"]');
        phoneInputs.forEach(input => {
            input.addEventListener('input', function (e) {
                let x = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
                e.target.value = !x[2] ? x[1] : '(' + x[1] + ') ' + x[2] + (x[3] ? '-' + x[3] : '');
            });
        });
    });
</script>
{% endblock %}
