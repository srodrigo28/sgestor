<!-- Task Modal Component -->
<div id="taskModal" class="fixed inset-0 z-50 hidden">
    <div class="absolute inset-0 bg-black/60 backdrop-blur-sm transition-opacity" onclick="closeModal()"></div>

    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-md bg-[#171d21] border border-gray-800 rounded-xl shadow-2xl transform transition-all scale-100 p-6">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h3 class="text-xl font-bold text-white">Nova Tarefa</h3>
                <p class="mt-1 text-sm text-gray-500">Escolha uma categoria própria da sua conta.</p>
            </div>
            <button onclick="closeModal()" class="text-gray-400 hover:text-white transition">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <form action="{{ url_for('tasks.create_task') }}" method="POST" class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Título</label>
                <input type="text" name="title" required placeholder="Ex: Reunião com Cliente"
                    class="w-full bg-[#11161a] border border-gray-700 rounded-lg py-2 px-3 text-white focus:outline-none focus:border-blue-500 transition">
            </div>

            <div>
                <div class="mb-2 flex items-center justify-between gap-3">
                    <label class="block text-xs font-bold text-gray-400 uppercase">Categoria</label>
                    <button type="button" onclick="closeModal(); openCategoryModal();"
                        class="text-xs font-medium text-blue-400 hover:text-blue-300 transition">Gerenciar categorias</button>
                </div>
                <select name="category_id"
                    class="w-full bg-[#11161a] border border-gray-700 rounded-lg py-2 px-3 text-white focus:outline-none focus:border-blue-500 transition">
                    {% for category in task_categories | default([]) %}
                    <option value="{{ category.id }}">{{ category.icon }} {{ category.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Previsão de Conclusão</label>
                <input type="date" name="due_date"
                    class="w-full bg-[#11161a] border border-gray-700 rounded-lg py-2 px-3 text-white focus:outline-none focus:border-blue-500 transition">
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Descrição</label>
                <textarea name="description" rows="3" placeholder="Detalhes da tarefa..."
                    class="w-full bg-[#11161a] border border-gray-700 rounded-lg py-2 px-3 text-white focus:outline-none focus:border-blue-500 transition resize-none"></textarea>
            </div>

            <div class="flex gap-3 mt-6">
                <button type="button" onclick="closeModal()"
                    class="flex-1 py-2.5 bg-gray-700 hover:bg-gray-600 text-white rounded-lg font-medium transition">
                    Cancelar
                </button>
                <button type="submit"
                    class="flex-1 py-2.5 bg-blue-600 hover:bg-blue-500 text-white rounded-lg font-medium transition shadow-lg shadow-blue-500/20">
                    Criar Tarefa
                </button>
            </div>
        </form>
    </div>
</div>
