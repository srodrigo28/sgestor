<!-- Task Edit Modal Component -->
<div id="editTaskModal" class="fixed inset-0 z-50 hidden">
    <!-- Backdrop -->
    <div class="absolute inset-0 bg-black/60 backdrop-blur-sm transition-opacity" onclick="closeEditModal()"></div>

    <!-- Modal Content -->
    <div
        class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-md bg-[#171d21] border border-gray-800 rounded-xl shadow-2xl transform transition-all scale-100 p-6">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-xl font-bold text-white">Editar Tarefa</h3>
            <button onclick="closeEditModal()" class="text-gray-400 hover:text-white transition">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <form id="editTaskForm" method="POST" class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Título</label>
                <input type="text" id="edit_title" name="title" required
                    class="w-full bg-[#11161a] border border-gray-700 rounded-lg py-2 px-3 text-white focus:outline-none focus:border-blue-500 transition">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Categoria</label>
                    <select id="edit_category" name="category"
                        class="w-full bg-[#11161a] border border-gray-700 rounded-lg py-2 px-3 text-white focus:outline-none focus:border-blue-500 transition">
                        <option value="Trabalho">💼 Trabalho</option>
                        <option value="Estudo">📚 Estudo</option>
                        <option value="Pessoal">🏠 Pessoal</option>
                        <option value="Saúde">💪 Saúde</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Status</label>
                    <select id="edit_status" name="status"
                        class="w-full bg-[#11161a] border border-gray-700 rounded-lg py-2 px-3 text-white focus:outline-none focus:border-blue-500 transition">
                        <option value="a_fazer">⏳ A Fazer</option>
                        <option value="fazendo">🚀 Fazendo</option>
                        <option value="feito">✅ Feito</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Previsão de Conclusão</label>
                <input type="date" id="edit_due_date" name="due_date"
                    class="w-full bg-[#11161a] border border-gray-700 rounded-lg py-2 px-3 text-white focus:outline-none focus:border-blue-500 transition">
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Descrição</label>
                <textarea id="edit_description" name="description" rows="3"
                    class="w-full bg-[#11161a] border border-gray-700 rounded-lg py-2 px-3 text-white focus:outline-none focus:border-blue-500 transition resize-none"></textarea>
            </div>

            <div class="flex gap-3 mt-6">
                <button type="button" onclick="closeEditModal()"
                    class="flex-1 py-2.5 bg-gray-700 hover:bg-gray-600 text-white rounded-lg font-medium transition">
                    Cancelar
                </button>
                <button type="submit"
                    class="flex-1 py-2.5 bg-blue-600 hover:bg-blue-500 text-white rounded-lg font-medium transition shadow-lg shadow-blue-500/20">
                    Salvar Alterações
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    function openEditModal(task) {
        // Popula o formulário
        document.getElementById('editTaskForm').action = `/tasks/edit/${task.id}`;
        document.getElementById('edit_title').value = task.title;
        document.getElementById('edit_description').value = task.description || '';
        document.getElementById('edit_category').value = task.category || 'Pessoal';
        document.getElementById('edit_status').value = task.status || 'a_fazer';
        document.getElementById('edit_due_date').value = task.due_date || '';

        // Abre o modal
        document.getElementById('editTaskModal').classList.remove('hidden');
    }

    function closeEditModal() {
        document.getElementById('editTaskModal').classList.add('hidden');
    }
</script>
